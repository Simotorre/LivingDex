<!DOCTYPE html>

<html>

<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script type="text/JavaScript" src="https://cdn.jsdelivr.net/npm/lodash@4.17.20/lodash.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="stylesheet" href="Main.css">
    <title>Living Dex</title>
    <macrolist>
        <macro>

        </macro>
    </macrolist>
</head>

<body>
    <h1 class="btn_bar">
        <span><button id="select_gen_btn">Seleziona generazione</button></span>
        <span class="right"><button mode="dark" id="dark_light_btn">Light Mode</button></span>
        <span class="right"><button id="change_img_btn">Cambia Visuale</button></span>
        <span class="right"><button id="change_img_fixed_btn" style="display:none;">⇄</button></span>
    </h1>

    <div id="gen_options">
        <span>
            <img class="gen" id="gen_1" src="https://www.serebii.net/pokemon/generation1.png" title="1st"></img>
            <img class="gen" id="gen_2" src="https://www.serebii.net/pokemon/generation2.png" title="2nd"></img>
            <img class="gen" id="gen_3" src="https://www.serebii.net/pokemon/generation3.png" title="3rd"></img>
            <img class="gen" id="gen_4" src="https://www.serebii.net/pokemon/generation4.png" title="4th"></img>
            <img class="gen" id="gen_5" src="https://www.serebii.net/pokemon/generation5.png" title="5th"></img>
            <img class="gen" id="gen_6" src="https://www.serebii.net/pokemon/generation6.png" title="6th"></img>
            <img class="gen" id="gen_7" src="https://www.serebii.net/pokemon/generation7.png" title="7th"></img>
            <img class="gen" id="gen_8" src="https://www.serebii.net/pokemon/generation8.png" title="8th"></img>
            <img class="gen" id="gen_9" src="https://www.serebii.net/pokemon/generation9.png" title="9th"></img>
        </span>
    </div>

    <!-- MODALE per le IMMAGINI dei POKEMON -->
    <div id="modal" class="modal">

        <span class="close">&times;</span>

        <div class="modal-container">

            <!-- ========================= -->
            <!-- LEFT -->
            <!-- ========================= -->

            <div class="modal-main">

                <div class="poke-header">
                    <div id="vg_name"></div>
                    <div id="vg_num"></div>
                </div>

                <img id="artwork_modal_img" class="artwork">

                <!-- <div class="types">
                    <div id="type1"></div>
                    <div id="type2"></div>
                </div> -->

                <!-- ========================= -->
                <!-- BODY -->
                <!-- ========================= -->

                <div class="info-section">
                    <div class="info-card type-card">

                        <div class="info-title">Types</div>

                        <div class="type-row">

                            <div class="type-item" id="type1"></div>

                            <div class="type-item" id="type2"></div>

                        </div>

                    </div>
                    <div class="info-card">
                        <div class="info-title">Height</div>
                        <div class="info-value" id="height"></div>
                    </div>

                    <div class="info-card">
                        <div class="info-title">Weight</div>
                        <div class="info-value" id="weight"></div>
                    </div>

                </div>

                <!-- ========================= -->
                <!-- ABILITIES -->
                <!-- ========================= -->

                <div class="info-section">

                    <div class="info-card">
                        <div class="info-title">1st Ability</div>
                        <div class="info-value" id="first_ability"></div>
                    </div>

                    <div class="info-card">
                        <div class="info-title">2nd Ability</div>
                        <div class="info-value" id="second_ability"></div>
                    </div>

                    <div class="info-card">
                        <div class="info-title">Hidden Ability</div>
                        <div class="info-value" id="hidden_ability"></div>
                    </div>

                </div>

                <!-- ========================= -->
                <!-- EGGS -->
                <!-- ========================= -->

                <div class="info-section">

                    <div class="info-card">
                        <div class="info-title">Egg Group</div>
                        <div class="info-value" id="first_egg_group"></div>
                    </div>

                    <div class="info-card">
                        <div class="info-title">2nd Group</div>
                        <div class="info-value" id="second_egg_group"></div>
                    </div>

                    <div class="info-card">
                        <div class="info-title">Egg Cycles</div>
                        <div class="info-value" id="egg_cycle"></div>
                    </div>

                </div>

                <!-- ========================= -->
                <!-- EXP -->
                <!-- ========================= -->

                <div class="info-section">

                    <div class="info-card">
                        <div class="info-title">Catch Rate</div>
                        <div class="info-value" id="catch_rate"></div>
                    </div>

                    <div class="info-card">
                        <div class="info-title">Base EXP</div>
                        <div class="info-value" id="base_exp"></div>
                    </div>

                    <div class="info-card">
                        <div class="info-title">Total EXP</div>
                        <div class="info-value" id="total_exp"></div>
                    </div>

                </div>

                <!-- ========================= -->
                <!-- STATS -->
                <!-- ========================= -->

                <div class="stats">

                    <div class="stats-header">

                        <div>Stat</div>
                        <div></div>
                        <div>Value</div>
                        <div>EV</div>

                    </div>

                    <div class="stat-row" id="hp_row">

                        <div class="stat-name">HP</div>

                        <div class="stat-bar-container">
                            <div class="stat-bar"></div>
                        </div>

                        <div class="stat-value"></div>

                        <div class="stat-ev"></div>

                    </div>

                    <div class="stat-row" id="atk_row">

                        <div class="stat-name">Attack</div>

                        <div class="stat-bar-container">
                            <div class="stat-bar"></div>
                        </div>

                        <div class="stat-value"></div>

                        <div class="stat-ev"></div>

                    </div>

                    <div class="stat-row" id="def_row">

                        <div class="stat-name">Defense</div>

                        <div class="stat-bar-container">
                            <div class="stat-bar"></div>
                        </div>

                        <div class="stat-value"></div>

                        <div class="stat-ev"></div>

                    </div>

                    <div class="stat-row" id="atksp_row">

                        <div class="stat-name">Sp. Attack</div>

                        <div class="stat-bar-container">
                            <div class="stat-bar"></div>
                        </div>

                        <div class="stat-value"></div>

                        <div class="stat-ev"></div>

                    </div>

                    <div class="stat-row" id="defsp_row">

                        <div class="stat-name">Sp. Defense</div>

                        <div class="stat-bar-container">
                            <div class="stat-bar"></div>
                        </div>

                        <div class="stat-value"></div>

                        <div class="stat-ev"></div>

                    </div>

                    <div class="stat-row" id="spe_row">

                        <div class="stat-name">Speed</div>

                        <div class="stat-bar-container">
                            <div class="stat-bar"></div>
                        </div>

                        <div class="stat-value"></div>

                        <div class="stat-ev"></div>

                    </div>

                    <div class="stat-row total-row" id="tot_row">

                        <div class="stat-name">Total</div>

                        <div class="stat-bar-container">
                            <div class="stat-bar"></div>
                        </div>

                        <div class="stat-value"></div>

                        <div class="stat-ev"></div>

                    </div>

                </div>

            </div>

            <!-- ========================= -->
            <!-- RIGHT -->
            <!-- ========================= -->

            <div class="modal-side">

                <img id="card_modal_img">

                <div id="card_modal_logo">

                    <img id="img_set_logo">

                </div>

            </div>

        </div>

    </div>

    <br />
    <!-- TABELLA POKEDEX -->
    <div id="gen_table_div"></div>

    <script type="module" src="Main.js"></script>

</body>

</html>
